<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бизнес-курсы для предпринимателей</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #0f172a;
    color: white;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
}

.container {
    width: 90%;
    max-width: 1200px;
    margin: auto;
}

/* ================= HEADER ================= */

header {
    padding: 140px 0;
    text-align: center;
    background: linear-gradient(rgba(15,23,42,0.85), rgba(15,23,42,0.85)), 
                url('me.jpg') center/cover no-repeat;
}

header h1 {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 800;
    margin-bottom: 20px;
}

header p {
    font-size: clamp(16px, 2.5vw, 20px);
    color: #cbd5e1;
    max-width: 700px;
    margin: auto;
}

.btn {
    display: inline-block;
    margin-top: 30px;
    padding: 14px 32px;
    background: #22c55e;
    color: black;
    font-weight: 600;
    border-radius: 10px;
    text-decoration: none;
    transition: 0.3s ease;
}

.btn:hover {
    background: #16a34a;
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(34,197,94,0.3);
}

/* ================= SECTIONS ================= */

section {
    padding: 80px 0;
}

.section-title {
    text-align: center;
    font-size: clamp(24px, 4vw, 36px);
    margin-bottom: 50px;
}

.features, .audience, .pricing {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

/* ================= CARDS ================= */

.feature, .audience-item, .card {
    background: #1e293b;
    padding: 30px;
    border-radius: 20px;
    flex: 1;
    min-width: 260px;
    max-width: 350px;
    text-align: center;
    transition: 0.3s ease;
}

.feature:hover,
.audience-item:hover,
.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
}

.price {
    font-size: 34px;
    font-weight: 800;
    margin: 20px 0;
    color: #22c55e;
}

.card ul {
    list-style: none;
    margin-bottom: 25px;
}

.card ul li {
    margin-bottom: 10px;
    color: #cbd5e1;
}

/* ================= FORM ================= */

form {
    background: #1e293b;
    padding: 40px;
    border-radius: 20px;
    max-width: 600px;
    margin: auto;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

form input {
    width: 100%;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
}

form input:focus {
    box-shadow: 0 0 0 2px #22c55e;
}

/* ================= FAQ ================= */

.faq-item {
    background: #1e293b;
    padding: 25px;
    border-radius: 16px;
    margin-bottom: 20px;
    transition: 0.3s;
}

.faq-item:hover {
    background: #243447;
}

/* ================= CONTACTS ================= */

.contacts {
    text-align: center;
    margin-top: 40px;
}

.contacts a {
    display: inline-block;
    margin: 10px 15px;
    color: #22c55e;
    font-weight: 600;
    text-decoration: none;
    transition: 0.3s;
}

.contacts a:hover {
    color: white;
}

/* ================= FOOTER ================= */

footer {
    text-align: center;
    padding: 40px 0;
    color: #94a3b8;
    font-size: 14px;
    border-top: 1px solid rgba(255,255,255,0.05);
}

/* ================= MOBILE ================= */

@media(max-width: 768px) {
    header {
        padding: 100px 0;
    }

    section {
        padding: 60px 0;
    }

    .feature, .audience-item, .card {
        width: 100%;
    }

    form {
        padding: 30px 20px;
    }
}
</style>
</head>
